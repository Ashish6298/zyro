<svg viewBox="0 0 800 350" width="100%" height="350" xmlns="http://www.w3.org/2000/svg" style="background: #0B0E14; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); font-family: 'Outfit', 'Inter', system-ui, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#0072FF" />
    </linearGradient>
    <linearGradient id="neonMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007A" />
      <stop offset="100%" stop-color="#7900FF" />
    </linearGradient>
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0B0E14" stop-opacity="0" />
    </radialGradient>

    <!-- Filters -->
    <filter id="neonFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Timeline Animations for Browser Simulation */
    @keyframes blinkCursor {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes typeUrl {
      0% { width: 0; }
      30%, 100% { width: 220px; }
    }
    @keyframes scalePlay {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    @keyframes waveGrow {
      0%, 100% { height: 8px; }
      50% { height: 26px; }
    }
    @keyframes adShieldZap {
      0%, 15% { opacity: 0; transform: scale(0.6); }
      20%, 35% { opacity: 1; transform: scale(1); }
      40%, 100% { opacity: 0; transform: scale(1.2); }
    }
    @keyframes adBannerSlide {
      0% { transform: translateY(50px); opacity: 0; }
      12% { transform: translateY(0); opacity: 1; }
      20% { transform: translateY(0); opacity: 1; filter: hue-rotate(0deg); }
      25%, 100% { transform: translateY(-30px); opacity: 0; filter: hue-rotate(90deg); }
    }
    @keyframes downloadTrigger {
      0%, 30% { opacity: 0; transform: translateY(10px); }
      35%, 85% { opacity: 1; transform: translateY(0); }
      90%, 100% { opacity: 0; transform: translateY(-10px); }
    }
    @keyframes progressFill {
      0%, 35% { stroke-dashoffset: 160; }
      75% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes successCheck {
      0%, 75% { opacity: 0; transform: scale(0.5); }
      80%, 95% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; }
    }

    .cursor {
      animation: blinkCursor 0.8s infinite;
    }
    .url-type {
      animation: typeUrl 8s steps(25) infinite;
      overflow: hidden;
      white-space: nowrap;
      display: inline-block;
    }
    .play-btn {
      animation: scalePlay 2s ease-in-out infinite;
      transform-origin: 240px 185px;
    }
    .audio-wave {
      animation: waveGrow 1.2s ease-in-out infinite alternate;
      transform-origin: bottom;
    }
    .shield-zap {
      animation: adShieldZap 8s ease-in-out infinite;
      transform-origin: 240px 185px;
    }
    .ad-banner {
      animation: adBannerSlide 8s ease-in-out infinite;
    }
    .download-widget {
      animation: downloadTrigger 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .progress-bar-fill {
      stroke-dasharray: 160;
      stroke-dashoffset: 160;
      animation: progressFill 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .success-check {
      animation: successCheck 8s ease-in-out infinite;
      transform-origin: 670px 245px;
    }
  </style>

  <!-- Background Grid -->
  <rect width="800" height="350" fill="#0B0E14" />
  <g opacity="0.15">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300" stroke="#94A3B8" stroke-width="1" />
    <path d="M 100,0 L 100,350 M 200,0 L 200,350 M 300,0 L 300,350 M 400,0 L 400,350 M 500,0 L 500,350 M 600,0 L 600,350 M 700,0 L 700,350" stroke="#94A3B8" stroke-width="1" stroke-dasharray="2 6" />
  </g>

  <circle cx="400" cy="175" r="200" fill="url(#screenGlow)" opacity="0.8" />

  <!-- BROWSER SHELL CONTAINER -->
  <g transform="translate(40, 25)">
    <!-- Browser Window Outline -->
    <rect width="720" height="300" rx="14" fill="#0F172A" stroke="#1E293B" stroke-width="2.5" />
    <!-- Browser Header / Title Bar -->
    <path d="M 0,14 A 14,14 0 0,1 14,0 L 706,0 A 14,14 0 0,1 720,14 L 720,45 L 0,45 Z" fill="#0B0E14" />

    <!-- Window Dots (Red, Yellow, Green) -->
    <circle cx="20" cy="22" r="5" fill="#EF4444" />
    <circle cx="36" cy="22" r="5" fill="#F59E0B" />
    <circle cx="52" cy="22" r="5" fill="#10B981" />

    <!-- Navigation Arrows -->
    <path d="M 85,22 L 77,22 M 81,18 L 77,22 L 81,26" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 97,22 L 105,22 M 101,18 L 105,22 L 101,26" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- URL INPUT FIELD -->
    <g transform="translate(130, 10)">
      <rect width="360" height="24" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1" />
      <circle cx="15" cy="12" r="3.5" fill="#10B981" />
      <text x="28" y="16" fill="#00F0FF" font-size="10" font-weight="700" letter-spacing="0.5">https://zyro.app/watch?v=media_source</text>
      <!-- Typing Cursor -->
      <rect x="250" y="7" width="2" height="10" fill="#00F0FF" class="cursor" />
    </g>

    <!-- Bento Settings Dock Indicator (Top Right) -->
    <g transform="translate(510, 10)">
      <rect width="85" height="24" rx="6" fill="rgba(0, 240, 255, 0.15)" stroke="url(#neonCyan)" stroke-width="1.5" filter="url(#neonFilter)" opacity="0.8"/>
      <rect width="85" height="24" rx="6" fill="none" stroke="#00F0FF" stroke-width="1" />
      <text x="42.5" y="16" fill="#00F0FF" font-size="9" font-weight="900" letter-spacing="1" text-anchor="middle">ADBLOCK: ON</text>
    </g>

    <!-- Extensions Active Icon -->
    <g transform="translate(685, 12)">
      <circle cx="10" cy="10" r="10" fill="url(#neonMagenta)" opacity="0.3" filter="url(#neonFilter)" />
      <circle cx="10" cy="10" r="10" fill="none" stroke="#FF007A" stroke-width="1.5" />
      <path d="M 7,10 L 13,10 M 10,7 L 10,13" stroke="#FFFFFF" stroke-width="1.5" />
    </g>

    <!-- BROWSER CONTENT VIEWPORT -->
    <!-- Left Column: Interactive Web Video Page -->
    <g transform="translate(20, 60)">
      <!-- Web Page Background Card -->
      <rect width="440" height="220" rx="10" fill="#0B0E14" stroke="#1E293B" stroke-width="1.5" />
      
      <!-- Video Player Frame -->
      <rect x="15" y="15" width="410" height="190" rx="8" fill="#020617" stroke="#1E293B" stroke-width="1" />
      
      <!-- Video Content representation -->
      <!-- Moving Waveform Bars (Playing state) -->
      <g transform="translate(45, 160)">
        <rect x="0" y="-15" width="4" height="15" fill="#00F0FF" class="audio-wave" />
        <rect x="8" y="-25" width="4" height="25" fill="#00F0FF" class="audio-wave" style="animation-delay: 0.2s;" />
        <rect x="16" y="-10" width="4" height="10" fill="#00F0FF" class="audio-wave" style="animation-delay: 0.4s;" />
        <rect x="24" y="-30" width="4" height="30" fill="#00F0FF" class="audio-wave" style="animation-delay: 0.1s;" />
        <rect x="32" y="-18" width="4" height="18" fill="#00F0FF" class="audio-wave" style="animation-delay: 0.3s;" />
      </g>

      <!-- Video Progress Seek Bar -->
      <rect x="100" y="180" width="300" height="4" rx="2" fill="#1E293B" />
      <rect x="100" y="180" width="160" height="4" rx="2" fill="#00F0FF" />
      <circle cx="260" cy="182" r="4" fill="#FFFFFF" />

      <!-- Center Play/Pause button (pulsing) -->
      <g class="play-btn">
        <circle cx="220" cy="100" r="20" fill="url(#neonCyan)" opacity="0.3" filter="url(#neonFilter)" />
        <circle cx="220" cy="100" r="18" fill="#00F0FF" opacity="0.9" />
        <polygon points="215,91 231,100 215,109" fill="#0F172A" />
      </g>

      <!-- ANNOYING AD POPUP BLOCKING ACTION -->
      <!-- Ad Banner (Slides in and gets zapped/disappears) -->
      <g class="ad-banner" transform="translate(120, 20)">
        <rect width="200" height="60" rx="8" fill="#991B1B" stroke="#EF4444" stroke-width="1.5" />
        <text x="100" y="28" fill="#FFFFFF" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="1">⚠️ MALICIOUS AD BANNER</text>
        <text x="100" y="44" fill="#FCA5A5" font-size="8" font-weight="700" text-anchor="middle" letter-spacing="0.5">Redirecting script blocked</text>
      </g>

      <!-- AdBlock Shield Zap (Flashes and destroys the Ad Banner) -->
      <g class="shield-zap">
        <circle cx="220" cy="100" r="40" fill="none" stroke="#FF007A" stroke-width="2.5" stroke-dasharray="5 5" filter="url(#neonFilter)" />
        <!-- Shield Icon -->
        <path d="M 210,88 L 220,83 L 230,88 L 230,103 C 230,111 220,117 220,117 C 220,117 210,111 210,103 Z" fill="rgba(255, 0, 122, 0.2)" stroke="#FF007A" stroke-width="2" filter="url(#neonFilter)" />
        <text x="220" y="127" fill="#FF007A" font-size="8" font-weight="900" text-anchor="middle" letter-spacing="1">AD-BLOCK ACTIVE</text>
      </g>
    </g>

    <!-- Right Column: Downloader & Transcoder Control Bento Panels -->
    <g transform="translate(480, 60)">
      <!-- Sidebar BG -->
      <rect width="220" height="220" rx="10" fill="#0B0E14" stroke="#1E293B" stroke-width="1.5" />

      <!-- Panel Title -->
      <text x="15" y="25" fill="#94A3B8" font-size="10" font-weight="900" letter-spacing="1.5">ZYRO DOWNLOAD MANAGER</text>
      
      <!-- Interactive Widget (Triggers in sync with video play) -->
      <g class="download-widget">
        <!-- Sniffer notification card -->
        <rect x="12" y="35" width="196" height="55" rx="8" fill="rgba(0, 240, 255, 0.05)" stroke="url(#neonCyan)" stroke-width="1.5" />
        <circle cx="26" cy="62" r="5" fill="#00F0FF" class="cursor" />
        <text x="42" y="55" fill="#00F0FF" font-size="9" font-weight="900" letter-spacing="1">SNIFFED VIDEO DETECTED!</text>
        <text x="42" y="72" fill="#94A3B8" font-size="8" font-weight="600">mp4 stream resolved • 1080p</text>

        <!-- Downloader Action Frame -->
        <g transform="translate(0, 75)">
          <rect x="12" y="25" width="196" height="85" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
          
          <text x="25" y="44" fill="#FFFFFF" font-size="9" font-weight="800" letter-spacing="0.5">FFmpeg Muxing Video + Audio...</text>
          
          <!-- Download Progress Bar -->
          <line x1="25" y1="56" x2="185" y2="56" stroke="#0F172A" stroke-width="6" stroke-linecap="round" />
          <!-- Animated progress fill -->
          <line x1="25" y1="56" x2="185" y2="56" stroke="url(#progressGrad)" stroke-width="6" stroke-linecap="round" class="progress-bar-fill" />
          
          <!-- Muxer output tag -->
          <text x="25" y="80" fill="#34D399" font-size="8" font-weight="800">Status: Downloading pipeline active</text>
        </g>
      </g>

      <!-- Successful Download Popup (Success check overlay) -->
      <g class="success-check">
        <rect x="12" y="130" width="196" height="55" rx="8" fill="rgba(52, 211, 153, 0.15)" stroke="#34D399" stroke-width="1.5" />
        <!-- Checkmark SVG shape -->
        <circle cx="32" cy="158" r="10" fill="#34D399" />
        <path d="M 27,158 L 30,161 L 37,154" fill="none" stroke="#0B0E14" stroke-width="2" stroke-linecap="round" />
        <text x="50" y="152" fill="#34D399" font-size="9" font-weight="900" letter-spacing="1">DOWNLOAD SUCCESSFUL</text>
        <text x="50" y="168" fill="#94A3B8" font-size="8" font-weight="600">File muxed: watch_video.mp4</text>
      </g>
    </g>

  </g>
</svg>
